name: Build and deploy Node.js project to Azure Function App - sitestatus-ping-worker-ge-west

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'ping-worker'
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        shell: bash
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          npm install
          npm run build --if-present

      - name: Zip
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          zip -r ../release.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip
        run: |
          unzip node-app.zip -d .
          if [ -f "release.zip" ]; then unzip -o release.zip -d .; fi

      - name: Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4C1992F2E74946A480EE91828A0EB4B4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56A8C1A199A248C6B39D50806B9D177B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B870DA3737344B3EB9066D8FA56896E9 }}

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: 'sitestatus-ping-worker-ge-west'
          slot-name: 'Production'
          package: '.'
