name: Deploy Ping Workers to Multiple Regions

on:
  push:
    branches: [main]
    paths:
      - 'ping-worker/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - region: 'tasks-eu-west'
            app_name: 'sitestatus-ping-worker-ge-west'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'ping-worker/package-lock.json'

      - name: Build Project
        run: |
          cd ping-worker
          npm install
          npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Azure Function Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ matrix.app_name }}
          app-settings-json: |
            [
              {
                "name": "SERVICE_BUS_CONNECTION_STRING",
                "value": "${{ secrets.SERVICE_BUS_CONNECTION_STRING }}",
                "slotSetting": false
              },
              {
                "name": "MAIN_API_URL",
                "value": "${{ secrets.MAIN_API_URL }}",
                "slotSetting": false
              },
              {
                "name": "WORKER_SECRET_KEY",
                "value": "${{ secrets.WORKER_SECRET_KEY }}",
                "slotSetting": false
              },
              {
                "name": "WORKER_REGION",
                "value": "${{ matrix.region }}",
                "slotSetting": false
              }
            ]

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ matrix.app_name }}
          package: './ping-worker'
