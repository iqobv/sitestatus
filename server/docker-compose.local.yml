services:
  database:
    container_name: sitestatus_db
    image: postgres:18.3
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - sitestatus_network
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    container_name: sitestatus_redis
    image: redis:8.6
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    networks:
      - sitestatus_network
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

networks:
  sitestatus_network:
