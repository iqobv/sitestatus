services:
  database:
    container_name: uptime_monitor_db
    image: postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - uptime_monitor_network
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    container_name: uptime_monitor_redis
    image: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    networks:
      - uptime_monitor_network
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

networks:
  uptime_monitor_network:
