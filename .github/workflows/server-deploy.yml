name: Deploy NestJS server to Cloud Run

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/server-deploy.yml"

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.REPO }}/${{ secrets.CONTAINER_NAME }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.REPO }}/${{ secrets.CONTAINER_NAME }}:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Set Image SHA variable
        run: |
          IMAGE_SHA="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.REPO }}/${{ secrets.CONTAINER_NAME }}:${{ github.sha }}"
          echo "IMAGE_SHA=$IMAGE_SHA" >> $GITHUB_ENV

      - name: Run Prisma Schema Migration (migrate deploy)
        run: |
          docker run --rm \
            -e "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            -e "NODE_ENV=production" \
            "$IMAGE_SHA" \
            npx prisma migrate deploy

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.SERVICE_NAME }} \
            --image $IMAGE_SHA \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
