name: Deploy server to DigitalOcean

on:
  push:
    branches: ['main']
    paths:
      - 'server/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sitestatus-api:latest
            ghcr.io/${{ github.repository_owner }}/sitestatus-api:${{ github.sha }}
          build-args: |
            POSTGRES_URI=${{ secrets.POSTGRES_URI }}
            DATABASE_URL=${{ secrets.POSTGRES_URI }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH Deploy and Migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            mkdir -p ~/app && cd ~/app

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            cat <<'EOF' > .env
            PORT=3000
            NODE_ENV=production
            ${{ secrets.ENV_FILE }}
            POSTGRES_URI=${{ secrets.POSTGRES_URI }}
            DATABASE_URL=${{ secrets.POSTGRES_URI }}
            EOF

            docker pull ghcr.io/${{ github.repository_owner }}/sitestatus-api:latest

            docker run --rm \
              --env-file .env \
              -e DATABASE_URL="${{ secrets.POSTGRES_URI }}" \
              -e POSTGRES_URI="${{ secrets.POSTGRES_URI }}" \
              ghcr.io/${{ github.repository_owner }}/sitestatus-api:latest \
              npx prisma migrate deploy

            docker stop nestjs-server || true
            docker rm nestjs-server || true

            docker run -d \
              --name nestjs-server \
              --restart always \
              --env-file .env \
              -p 127.0.0.1:3000:3000 \
              ghcr.io/${{ github.repository_owner }}/sitestatus-api:latest

            docker image prune -f
