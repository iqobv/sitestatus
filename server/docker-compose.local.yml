services:
  database:
    container_name: sitestatus_db
    image: postgres:18.3
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - sitestatus_network
    volumes:
      - postgres-data:/var/lib/postgresql

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - sitestatus_network

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    volumes:
      - ./sb-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      - ACCEPT_EULA=Y
      - SQL_SERVER=sqledge
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    depends_on:
      - sqledge
    networks:
      - sitestatus_network

  turso-local:
    image: ghcr.io/tursodatabase/libsql-server:latest
    container_name: turso_local
    ports:
      - "8080:8080"
    environment:
      - SQLD_NODE=primary
    volumes:
      - turso_data:/var/lib/sqld

volumes:
  postgres-data:
  servicebus-data:
  turso_data:

networks:
  sitestatus_network:
